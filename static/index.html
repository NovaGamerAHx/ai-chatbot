<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="css/globals.css?v=5">
    <link rel="stylesheet" href="css/layout.css?v=5">
    <link rel="stylesheet" href="css/chat.css?v=5">
    <link rel="stylesheet" href="css/components.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="images/6.png" alt="Logo" class="sidebar-logo">
            </div>
            <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>
            <ul id="chat-list" class="chat-list">
            </ul>
            <div class="user-panel">
                <span id="current-username">User</span>
                <button id="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">🌙</button>
                <span id="current-chat-title">New Chat</span>
            </header>
            
            <div id="messages-container" class="messages-container">
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-actions">
                        <button id="web-toggle" title="Toggle Web Search">🌐</button>
                    </div>
                    <textarea id="message-input" placeholder="Message AI..." rows="1"></textarea>
                    <div class="input-actions">
                        <button id="send-btn" title="Send">➤</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js?v=5"></script>
    <script src="js/utils.js?v=5"></script>
    <script src="js/api.js?v=5"></script>
    <script src="js/ui.js?v=5"></script>
    <script src="js/app.js?v=5"></script>
</body>
</html>
