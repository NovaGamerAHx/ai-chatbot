<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چت بات هوش مصنوعی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @import "tailwindcss";
        @variant dark (&:where(.dark, .dark *));
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(37, 99, 235, 0.2);
            border-radius: 20px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(37, 99, 235, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(21, 128, 61, 0.8);
        }
        #sidebar.closed {
            transform: translateX(100%);
            margin-right: -18rem;
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 h-screen flex overflow-hidden transition-colors duration-300">
    <aside id="sidebar" class="w-72 bg-white dark:bg-slate-900 text-slate-800 dark:text-white flex flex-col transition-all duration-300 border-l border-slate-200 dark:border-slate-800 z-20 flex-shrink-0 shadow-xl shadow-slate-200/50 dark:shadow-none">
        <div class="px-5 pt-5 pb-3 flex items-center justify-start gap-3">
            <div class="bg-gradient-to-br from-blue-600/15 to-green-700/5 p-2 rounded-xl border border-blue-500/20">
                <img src="images/6.png" alt="لوگو" class="h-8 w-auto object-contain">
            </div>
            <span class="font-black tracking-tight text-lg bg-gradient-to-l from-blue-600 to-green-700 bg-clip-text text-transparent">دستیار هوشمند</span>
        </div>
        <div class="px-4 pb-4 pt-1 space-y-4">
            <button id="new-chat-btn" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-green-700 hover:from-blue-500 hover:to-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-md shadow-blue-500/20 hover:shadow-lg hover:shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                <i data-lucide="plus" class="w-5 h-5"></i>
                گفتگوی جدید
            </button>
            <div class="relative group">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400 group-focus-within:text-blue-600 transition-colors"></i>
                </div>
                <input type="text" id="search-chat-input" class="bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 block w-full pr-9 p-2.5 outline-none transition-all shadow-sm" placeholder="جستجو در گفتگوها...">
            </div>
        </div>
        <ul id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-1.5 custom-scrollbar pb-2">
        </ul>
        <div class="p-4 bg-slate-50 dark:bg-slate-950/80 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="bg-gradient-to-tr from-blue-600 to-green-700 p-2 rounded-full shadow-sm border border-white/20">
                    <i data-lucide="user" class="w-4 h-4 text-white flex-shrink-0"></i>
                </div>
                <span id="current-username" class="truncate text-sm font-bold">کاربر</span>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 p-2 rounded-xl transition-all">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col h-screen relative bg-slate-50/50 dark:bg-slate-950 transition-colors duration-300 overflow-hidden">
        <header class="h-16 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 md:px-6 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl sticky top-0 z-10 transition-colors">
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle" class="p-2.5 text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <span id="current-chat-title" class="font-bold text-base md:text-lg text-slate-800 dark:text-slate-100 truncate max-w-[200px] md:max-w-md">انتخاب یا ایجاد چت</span>
            </div>
            <button id="theme-toggle" class="p-2.5 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                <i data-lucide="moon" class="w-5 h-5"></i>
            </button>
        </header>
        <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 custom-scrollbar relative">
        </div>
        <div class="p-4 md:p-6 bg-gradient-to-t from-slate-50 via-slate-50 dark:from-slate-950 dark:via-slate-950 to-transparent pt-10 border-t-0 relative z-10">
            <div class="max-w-4xl mx-auto relative flex items-end gap-2 bg-white dark:bg-slate-900 rounded-3xl p-2 border border-slate-200 dark:border-slate-850 focus-within:border-blue-500 dark:focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-500/10 shadow-lg shadow-slate-200/40 dark:shadow-none transition-all">
                <div class="flex pb-2 pl-2 gap-1">
                    <button id="web-toggle" class="p-3 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-500/10 rounded-2xl transition-all">
                        <i data-lucide="globe" class="w-5 h-5"></i>
                    </button>
                    <button id="ranker-toggle" class="hidden p-2.5 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-500/10 rounded-2xl transition-all border border-slate-200 dark:border-slate-700" title="حالت رنکر">
                        <i data-lucide="sliders-horizontal" class="w-4 h-4"></i>
                    </button>
                    <button id="mic-btn" class="p-3 text-slate-400 dark:text-slate-500 hover:text-green-600 dark:hover:text-green-400 hover:bg-green-50 dark:hover:bg-green-500/10 rounded-2xl transition-all">
                        <i data-lucide="mic" class="w-5 h-5"></i>
                    </button>
                </div>
                <textarea id="message-input" placeholder="پیام خود را بنویسید..." rows="1" class="flex-1 bg-transparent border-none focus:ring-0 resize-none py-3.5 px-3 max-h-32 overflow-y-auto outline-none text-slate-800 dark:text-white dark:placeholder-slate-500 custom-scrollbar text-base" dir="auto"></textarea>
                <div class="pb-2 pr-2">
                    <button id="send-btn" class="p-3.5 bg-gradient-to-r from-blue-600 to-green-700 hover:from-blue-500 hover:to-green-600 text-white rounded-2xl shadow-md shadow-blue-500/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-0.5 active:translate-y-0">
                        <i data-lucide="send" class="w-5 h-5 rtl:-scale-x-100"></i>
                    </button>
                </div>
            </div>
            <div class="text-center mt-3 text-xs text-slate-400 dark:text-slate-600 font-bold tracking-wide">
                هوش مصنوعی ممکن است اشتباه کند. اطلاعات مهم را بررسی کنید.
            </div>
        </div>
    </main>
    <script src="assets/libs/marked.min.js"></script>
    <script src="assets/libs/lucide.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>

</html>
